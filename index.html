<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Radio Streaming</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<header>

<h1>📻 RADIO STREAM</h1>

<p>Live Streaming Radio</p>

</header>


<!-- PLAYER -->

<div class="player">

<div class="player-info">

<div class="player-logo">📻</div>

<div>

<div id="playerTitle">Pilih Channel</div>

<div class="equalizer hidden" id="equalizer">

<span></span>
<span></span>
<span></span>
<span></span>

</div>

</div>

</div>

<div class="controls">

<button onclick="prevChannel()">⏮</button>

<button onclick="togglePlay()" id="playBtn">▶</button>

<button onclick="nextChannel()">⏭</button>

</div>

</div>


<!-- SEARCH -->

<div class="search">

<input id="search" placeholder="Cari channel radio">

</div>


<!-- CHANNEL LIST -->

<div id="channels" class="channel-grid"></div>

</div>


<audio id="audio"></audio>


<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/player.js"></script>
<script src="js/search.js"></script>

</body>

</html>
